# docker-compose.prod.yml
services:
  api:
    image: ghcr.io/hanguy21/unicorns-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4000"
    expose:
      - "4000"
    networks:
      - app-net

  web:
    image: ghcr.io/hanguy21/unicorns-web:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
